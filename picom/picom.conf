# --- Backend Settings ---
# 'glx' (smooth)
# 'xrender' for low end pc
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# --- Shadows ---
#shadow = false;
#shadow-radius = 12;
#shadow-offset-x = -12;
#shadow-offset-y = -12;
#shadow-opacity = 0.7;

# --- Fading ---
fading = true;
fade-delta = 6;
fade-in-step = 0.03;
fade-out-step = 0.03;

# --- Opacity (Transparency) ---
active-opacity = 1.0;
inactive-opacity = 0.8;
frame-opacity = 0.7;
inactive-opacity-override = false;

# --- Corners (Round corners) ---
corner-radius = 8;
#rounded-corners-exclude = [
##    "window_type = 'dock'",
##    "window_type = 'desktop'"
##];

# --- Blur ---
blur-method = "dual_kawase";
blur-strength = 5;
##blur-background-exclude = [
##    "window_type = 'dock'",
##    "window_type = 'desktop'",
##    "_GTK_FRAME_EXTENTS@:c"
##];

# --- General ---
vsync = true;
dbe = false;
unredir-if-possible = false;
detect-rounded-corners = true;
detect-client-opacity = true;

# Damage tracking — smoother redraws
use-damage = true;


opacity-rule = [
    "100:class_g = 'i3lock'",
    "100:class_g = 'Rofi'"
];

